<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đọc Truyện - Tori Lightnovel</title>
    <link rel="stylesheet" href="./styles/reading_style.css" />
  </head>
  <body id="reading-body">
    <div class="reading-sidebar">
      <a href="#" class="tool-btn" id="sidebar-prev-btn" title="Chương trước"
        >❮❮</a
      >
      <a
        href="#"
        class="tool-btn"
        id="sidebar-home-btn"
        title="Trang chủ truyện"
        >🏠︎</a
      >

      <button class="tool-btn" title="Tùy chỉnh chữ">A</button>
      <button
        class="tool-btn"
        id="read-theme-btn"
        onclick="toggleReadTheme()"
        title="Đổi màu nền"
      >
        ☀︎
      </button>
      <button class="tool-btn" title="Đánh dấu">🗒</button>

      <a href="#" class="tool-btn" id="sidebar-next-btn" title="Chương sau"
        >❯❯</a
      >
    </div>

    <main class="reading-container">
      <div class="reading-header">
        <h3 class="vol-title" id="read-vol-title">Đang tải tên tập...</h3>
        <h1 class="chapter-title" id="read-chap-title">
          Đang tải tên chương...
        </h1>
        <p class="chapter-meta" id="read-chap-meta"></p>
      </div>

      <div class="reading-content" id="read-content-box"></div>

      <div class="reading-nav-bottom" id="reading-nav-box"></div>
    </main>

    <script src="./scripts/data/Fake_DataBase.js"></script>
    <script src="./scripts/reading/Reading.js"></script>
  </body>
</html>
