<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng điều khiển</title>
    <link rel="stylesheet" href="./authentication_style.css" />
    <link rel="stylesheet" href="./footer_style.css" />
  </head>
  <body>
    <header class="authentication-header">
      <div class="logo">
        <a href="Home_Page.html"
          ><img src="picture/Tori_Logo_Transparent.png" alt=""
        /></a>
      </div>
      <div class="navigation-bar-top">
        <ul>
          <li><a href="Login.html">Đăng nhập</a></li>
          <li>
            <a href="Signup.html" class="button-general">Đăng ký</a>
          </li>
        </ul>
      </div>
    </header>
    <main class="authentication-main-content">
      <div class="authentication-main-content-tittle">
        <h2>Đăng ký tài khoản</h2>
        <p>Hoặc</p>
        <a href="Login.html">đăng nhập nếu đã có tài khoản</a>
      </div>
      <div class="authentication-main-content-form">
        <form id="myform">
          <p>Tên đăng nhập <span>*</span></p>
          <input type="text" id="reg-username" placeholder="Nhập tên" />

          <p>Địa chỉ email <span>*</span></p>
          <input type="email" id="reg-email" placeholder="Nhập địa chỉ email" />

          <p>Mật khẩu <span>*</span></p>
          <div class="password-wrapper" style="position: relative">
            <input
              type="password"
              id="reg-password"
              placeholder="Nhập mật khẩu"
              style="padding-right: 40px"
            />
            <span
              onclick="togglePassword('reg-password')"
              style="
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                font-size: 18px;
              "
              >🧐</span
            >
          </div>

          <p>Xác nhận mật khẩu <span>*</span></p>
          <div class="password-wrapper" style="position: relative">
            <input
              type="password"
              id="reg-confirm"
              placeholder="Xác nhận mật khẩu"
              style="padding-right: 40px"
            />
            <span
              onclick="togglePassword('reg-confirm')"
              style="
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                font-size: 18px;
              "
              >🧐</span
            >
          </div>
          <br />

          <button type="button" class="button-general" onclick="handleSignup()">
            Đăng ký
          </button>
        </form>
      </div>
    </main>
    <footer class="footer">
      <p>© 2026 Tori Lightnovel. Nền tảng đọc truyện trực tuyến.</p>
      <div class="footer-links">
        <a href="">Điều khoản</a>
        <a href="">Bảo mật</a>
        <a href="">Liên hệ</a>
      </div>
    </footer>
    <script src="Auth.js"></script>
  </body>
</html>
