<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ Hàng Của Bạn - Tori Lightnovel</title>

    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/cart.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
  </head>
  <body>
    

    <main class="main-content">
      <section class="left-section">
        <h2 class="section-title">🛒 Giỏ hàng của bạn</h2>
        <table class="cart-table">
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Giá tiền (Coin)</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="cart-items-tbody"></tbody>
        </table>
      </section>

      <section class="right-section">
        <h2 class="section-title">Tổng đơn</h2>
        <div class="summary-box">
          <div class="summary-row">
            <span>Số lượng:</span><span id="summary-qty">0 tập</span>
          </div>
          <div class="summary-row">
            <span>Số dư hiện tại:</span
            ><span id="summary-balance" style="font-weight: bold; color: green"
              >0 Coin</span
            >
          </div>
          <div class="summary-row summary-total">
            <span>Tổng cộng:</span><span id="summary-total-price">0 Coin</span>
          </div>
          <button
            class="button-general"
            onclick="processCheckout()"
            style="width: 100%; margin-top: 20px"
          >
            💳 Thanh toán ngay
          </button>
        </div>
      </section>
    </main>
    
    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/data/Fake_DataBase.js"></script>
    
    <script src="../../scripts/auth/Auth.js"></script>
    <script src="../../scripts/payment/cart.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
