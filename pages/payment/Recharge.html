<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nạp Tiền - Tori Lightnovel</title>
    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/recharge_style.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
  </head>
  <body>
    
    <main class="main-content" style="display: block">
      <div class="recharge-container">
        <h2 class="section-title" style="text-align: center; border: none">
          Nạp xu vào tài khoản
        </h2>

        <div class="form-group">
          <label>1. Chọn gói nạp tiền:</label>
          <div class="price-options">
            <div class="price-box" data-coins="200">
              200 Coin <br />
              <span style="font-size: 12px; font-weight: normal"
                >(20.000 VNĐ)</span
              >
            </div>
            <div class="price-box selected" data-coins="500">
              500 Coin <br />
              <span style="font-size: 12px; font-weight: normal"
                >(50.000 VNĐ)</span
              >
            </div>
            <div class="price-box" data-coins="1200">
              1200 Coin <br />
              <span style="font-size: 12px; font-weight: normal"
                >(100.000 VNĐ)</span
              >
            </div>
            <div class="price-box" data-coins="2500">
              2500 Coin <br />
              <span style="font-size: 12px; font-weight: normal"
                >(200.000 VNĐ)</span
              >
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="payment-method">2. Phương thức thanh toán:</label>
          <select id="payment-method" class="method-select">
            <option value="Bank">Ngân hàng (MB)</option>
            <option value="VNPay">Cổng VNPAY</option>
          </select>
        </div>
        <button
          type="button"
          class="button-general"
          onclick="submitRecharge()"
          style="width: 100%; padding: 12px; margin-top: 10px"
        >
          Tiến hành thanh toán
        </button>
      </div>
    </main>
    <div id="payment-modal" class="modal-overlay">
      <div class="modal-content">
        <h3 style="color: #000080; margin-bottom: 10px">
          Đang chờ thanh toán...
        </h3>
        <p>Vui lòng dùng ứng dụng ngân hàng quét mã QR bên dưới.</p>

        <div style="margin: 20px auto; text-align: center;">
          <img
            id="dynamic-qr-img"
            alt="Mã QR Thanh Toán"
            onclick="processPaymentNow()"
            style="border: 4px solid #000080; border-radius: 8px; padding: 5px; max-width: 100%; max-height: 250px; object-fit: contain; cursor: pointer;"
            title="Click vào mã QR để xác nhận nạp thành công ngay!"
          />
          <p style="font-size: 13px; color: #555; margin-top: 10px;">(Hoặc click trực tiếp vào mã QR để hoàn tất nạp tiền)</p>
        </div>

        <p style="font-size: 16px; margin-bottom: 15px">
          Hệ thống sẽ đóng mã QR sau:
          <strong id="countdown" style="color: red; font-size: 24px">30</strong>
          giây
        </p>

        <div class="loader"></div>
      </div>
    </div>

    
    <script src="../../scripts/ui/Routes.js"></script>
    
    <script src="../../scripts/auth/Auth.js"></script>
    <script src="../../scripts/payment/Recharge.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
