<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tìm Kiếm Nâng Cao - Tori Lightnovel</title>
    <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/card_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/advanced_search_style.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
    <link rel="stylesheet" href="https://unpkg.com/atropos/atropos.css" />
  </head>
  <body>

    <main class="main-content" style="display: block">
      <section class="advanced-search-section">
        <div class="section-header">
          <h2 class="section-title">Tìm kiếm nâng cao</h2>
        </div>

        <!-- Ô tìm kiếm theo tên -->
        <div class="search-keyword-box">
          <label><strong>Từ khoá:</strong></label>
          <input type="text" id="adv-search-title" placeholder="Nhập tên truyện, tác giả..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; margin-top: 8px;" />
        </div>

        <!-- Thể loại -->
        <div class="section-header" style="margin-top: 25px;">
          <h3 class="section-title" style="font-size: 17px;">Thể loại</h3>
        </div>
        <div class="genre-grid">
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Hành động" /> Hành động</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Phiêu lưu" /> Phiêu lưu</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Tình cảm" /> Tình cảm</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Hài hước" /> Hài hước</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Kinh dị" /> Kinh dị</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Trinh thám" /> Trinh thám</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Viễn tưởng" /> Viễn tưởng</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Đời thường" /> Đời thường</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Fantasy" /> Fantasy</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Isekai" /> Isekai</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Romance" /> Romance</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Sci-fi" /> Sci-fi</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Supernatural" /> Supernatural</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Shounen" /> Shounen</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Shoujo" /> Shoujo</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Seinen" /> Seinen</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="School Life" /> School Life</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Slice of Life" /> Slice of Life</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Sports" /> Sports</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Mystery" /> Mystery</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Horror" /> Horror</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Harem" /> Harem</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Mecha" /> Mecha</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Drama" /> Drama</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="One shot" /> One shot</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Martial Arts" /> Martial Arts</label>
          <label class="genre-item"><input type="checkbox" name="adv-genres" value="Tragedy" /> Tragedy</label>
        </div>

        <!-- Bộ lọc: Tình trạng + Năm xuất bản + Sắp xếp -->
        <div class="filter-controls">
          <div class="filter-group">
            <label for="adv-status-select"><strong>Tình trạng:</strong></label>
            <select id="adv-status-select">
              <option value="Tất cả">Tất cả</option>
              <option value="Đang tiến hành">Đang tiến hành</option>
              <option value="Hoàn thành">Hoàn thành</option>
              <option value="Tạm ngưng">Tạm ngưng</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="adv-year-select"><strong>Năm xuất bản:</strong></label>
            <select id="adv-year-select">
              <option value="Tất cả">Tất cả</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="adv-sort-select"><strong>Sắp xếp:</strong></label>
            <select id="adv-sort-select">
              <option value="newest">Mới nhất</option>
              <option value="az">Tên: A → Z</option>
              <option value="za">Tên: Z → A</option>
            </select>
          </div>
        </div>

        <!-- Nút hành động -->
        <div style="display: flex; gap: 15px; margin-top: 20px;">
          <button class="btn-search" id="btn-adv-search" style="padding: 10px 30px; background-color: #000080; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; transition: background-color 0.3s;">🔍 Tìm kiếm</button>
          <button class="btn-reset" onclick="resetFilters()">Reset ↺</button>
        </div>
      </section>

      <!-- KẾT QUẢ TÌM KIẾM -->
      <section class="advanced-search-section" id="search-results-section" style="margin-top: 20px; display: none;">
        <div class="section-header">
          <h2 class="section-title">Kết quả tìm kiếm (<span id="result-count">0</span> truyện)</h2>
        </div>
        <div id="adv-search-results" class="story-grid"></div>
      </section>
    </main>

    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
    <script>
      var API_URL = "http://localhost:5000/api";

      var currentPage = 1;
      var currentLimit = 12;

      // === TÌM KIẾM ===
      async function doAdvancedSearch(resetPage = true) {
        if (resetPage) currentPage = 1;

        var keyword = document.getElementById("adv-search-title").value.trim().normalize('NFC').toLowerCase();
        
        var checkedGenres = document.querySelectorAll('input[name="adv-genres"]:checked');
        var searchGenres = Array.from(checkedGenres).map(function(cb) { return cb.value.trim().normalize('NFC'); }).join(",");

        var status = document.getElementById("adv-status-select").value;
        var year = document.getElementById("adv-year-select").value;
        var sort = document.getElementById("adv-sort-select").value;

        var queryParams = new URLSearchParams();
        queryParams.append("page", currentPage);
        queryParams.append("limit", currentLimit);

        if (keyword) queryParams.append("title", keyword);
        if (status !== "Tất cả") queryParams.append("status", status);
        if (year !== "Tất cả") queryParams.append("year", year);
        if (searchGenres) queryParams.append("genres", searchGenres);
        if (sort) queryParams.append("sort", sort);

        var section = document.getElementById("search-results-section");
        var container = document.getElementById("adv-search-results");
        var countSpan = document.getElementById("result-count");

        section.style.display = "block";
        container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center;">Đang tải kết quả...</p>';

        try {
          var res = await fetch(API_URL + "/stories?" + queryParams.toString());
          if (!res.ok) throw new Error("Lỗi tải dữ liệu");
          
          var responseData = await res.json();
          var stories = Array.isArray(responseData) ? responseData : responseData.data;
          var totalPages = responseData.totalPages || 1;
          var totalItems = responseData.total || stories.length;

          countSpan.textContent = totalItems;
          renderResults(stories);
          renderPagination(totalPages);
        } catch (err) {
          console.error(err);
          container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: red;">Lỗi kết nối đến máy chủ!</p>';
        }
      }

      function renderPagination(totalPages) {
        var paginationContainer = document.getElementById("adv-pagination-container");
        if (!paginationContainer) {
          var section = document.getElementById("search-results-section");
          paginationContainer = document.createElement("div");
          paginationContainer.id = "adv-pagination-container";
          paginationContainer.className = "pagination";
          paginationContainer.style.marginTop = "30px";
          paginationContainer.style.display = "flex";
          paginationContainer.style.justifyContent = "center";
          paginationContainer.style.gap = "10px";
          section.appendChild(paginationContainer);
        }

        paginationContainer.innerHTML = "";
        if (totalPages <= 1) return;

        // Nút Prev
        var prevBtn = document.createElement("button");
        prevBtn.className = "btn btn-outline-primary";
        prevBtn.innerText = "« Trước";
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = function() {
          if (currentPage > 1) {
            currentPage--;
            doAdvancedSearch(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        };
        paginationContainer.appendChild(prevBtn);

        // Số trang
        for (let i = 1; i <= totalPages; i++) {
          let pageBtn = document.createElement("button");
          pageBtn.className = "btn " + (i === currentPage ? "btn-primary" : "btn-outline-primary");
          pageBtn.innerText = i;
          pageBtn.onclick = function() {
            if (currentPage !== i) {
              currentPage = i;
              doAdvancedSearch(false);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };
          paginationContainer.appendChild(pageBtn);
        }

        // Nút Next
        var nextBtn = document.createElement("button");
        nextBtn.className = "btn btn-outline-primary";
        nextBtn.innerText = "Sau »";
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = function() {
          if (currentPage < totalPages) {
            currentPage++;
            doAdvancedSearch(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        };
        paginationContainer.appendChild(nextBtn);
      }

      // === VẼ KẾT QUẢ ===
      function renderResults(stories) {
        var container = document.getElementById("adv-search-results");

        if (stories.length === 0) {
          container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #888; font-style: italic; padding: 30px;">Không tìm thấy truyện nào phù hợp.</p>';
          return;
        }

        var html = "";
        for (var i = 0; i < stories.length; i++) {
          var story = stories[i];
          var detailHref = typeof ToriRoutes !== "undefined"
            ? ToriRoutes.href("storyDetail", { id: story._id })
            : "../stories/Story_Detail.html?id=" + story._id;

          var premiumBadge = story.isPremium
            ? '<span style="position:absolute; top:5px; right:5px; background: #ffd700; color:#000; font-size:10px; font-weight:bold; padding:2px 5px; border-radius:3px;">Trả phí</span>'
            : "";

          var genreTags = "";
          if (story.genres && story.genres.length > 0) {
            for (var j = 0; j < story.genres.length; j++) {
              genreTags += '<span style="display:inline-block; background:#e8f4fd; color:#2b70a1; padding:1px 6px; border-radius:3px; font-size:11px; margin-right:4px; margin-top:4px;">' + story.genres[j] + '</span>';
            }
          }

          html += '<div class="atropos atropos-adv-' + story._id + '" style="width: 100%; height: 100%; cursor: pointer;" onclick="window.location.href=\'' + detailHref + '\'">' +
            '<div class="atropos-scale">' +
              '<div class="atropos-rotate">' +
                '<div class="atropos-inner">' +
                  '<a href="' + detailHref + '" class="story-card" style="text-decoration: none; display: flex; flex-direction: column; height: 100%; position: relative;">' +
                    premiumBadge +
                    '<img src="' + story.coverImg + '" alt="Bìa ' + story.title + '" data-atropos-offset="-5">' +
                    '<div class="story-info" data-atropos-offset="5" style="flex: 1;">' +
                      '<h3 class="story-title">' + story.title + '</h3>' +
                      '<p class="story-author">Tác giả: ' + story.author + '</p>' +
                      '<div>' + genreTags + '</div>' +
                    '</div>' +
                  '</a>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>';
        }
        container.innerHTML = html;

        if (typeof Atropos !== "undefined") {
          for (var i = 0; i < stories.length; i++) {
            Atropos({
              el: '.atropos-adv-' + stories[i]._id,
              activeOffset: 40,
              shadow: false,
              highlight: false
            });
          }
        }
      }

      // === RESET ===
      function resetFilters() {
        var checkboxes = document.querySelectorAll('input[name="adv-genres"]');
        checkboxes.forEach(function(cb) { cb.checked = false; });
        document.getElementById("adv-status-select").value = "Tất cả";
        document.getElementById("adv-year-select").value = "Tất cả";
        document.getElementById("adv-sort-select").value = "newest";
        document.getElementById("adv-search-title").value = "";
        document.getElementById("search-results-section").style.display = "none";
      }

      // === SỰ KIỆN ===
      document.addEventListener("DOMContentLoaded", function() {
        var searchBtn = document.getElementById("btn-adv-search");
        if (searchBtn) {
          searchBtn.addEventListener("click", doAdvancedSearch);
        }




        // Nếu có query param từ navbar search → tự động điền và tìm
        var urlParams = new URLSearchParams(window.location.search);
        var initTitle = urlParams.get("title");
        if (initTitle) {
          document.getElementById("adv-search-title").value = initTitle;
          doAdvancedSearch();
        }
      });
    </script>
    <script src="../../scripts/ui/Navbar.js"></script>
    <script src="https://unpkg.com/atropos/atropos.min.js"></script>
  </body>
</html>
