    <header class="header">

          </li>

      <div class="navigation-bar-bottom">
        <div class="navigation-bar-bottom-left_side">
          <ul>
            <li><a href="#" data-route="home">Trang chủ</a></li>
            <li><a href="#" data-route="storyList">Danh sách truyện</a></li>
            <li><a href="#" data-route="selfWritten">Truyện sáng tác</a></li>
            <li><a href="#" data-route="bookshelf">Tủ sách</a></li>
            <li>
              <a href="#" data-route="advancedSearch" class="active"
                >Tìm kiếm nâng cao</a
              >
            </li>
          </ul>
        </div>
        <div class="navigation-bar-bottom-right_side">
          <div class="search-bar">
            <input type="text" placeholder="Tìm kiếm truyện..." />
            <button type="submit" id="search-button">🔍︎</button>
          </div>
          <a href="#" data-route="cart" class="cart-icon" title="Giỏ hàng">
            🛒 <span id="cart-count">0</span>

          <button id="dark-mode-btn" onclick="toggleDarkMode()">
            ⏾ Tắt đèn
          </button>
          <button type="button" id="recharge" data-route-click="recharge">
            Nạp tiền
          </button>
        </div>
      </div>

        <div class="filter-controls">
          <div class="filter-group">
            <label for="status-select"><strong>Tình trạng:</strong></label>
            <select id="status-select">
              <option value="all">Tất cả</option>
              <option value="ongoing">Đang tiến hành</option>
              <option value="completed">Đã hoàn thành</option>
              <option value="paused">Tạm ngưng</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="sort-select"><strong>Sắp xếp:</strong></label>
            <select id="sort-select">
              <option value="newest">Mới cập nhật</option>
              <option value="views">Lượt xem nhiều nhất</option>
              <option value="rating">Đánh giá cao nhất</option>
              <option value="chapters">Nhiều chương nhất</option>
            </select>
          </div>
          <button class="btn-reset" onclick="resetFilters()">
            Reset ↺

    <script>
      function resetFilters() {
        const checkboxes = document.querySelectorAll(
          '.genre-item input[type="checkbox"]',
        );
        checkboxes.forEach((cb) => (cb.checked = false));
        document.getElementById("status-select").value = "all";
        document.getElementById("sort-select").value = "newest";
      }
    </script>
