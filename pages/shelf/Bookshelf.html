<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tủ Sách Của Tôi - Tori Lightnovel</title>
    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/card_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/bookshelf_style.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
  </head>
  <body>
    

    <main class="main-content">
      <section class="left-section" style="flex: 1">
        <div class="bookshelf-tabs">
          <button class="tab-btn" onclick="switchShelfTab('favorite')">
            ❤️ Truyện đã thích
          </button>
          <button class="tab-btn active" onclick="switchShelfTab('following')">
            📖 Truyện theo dõi
          </button>
          <button class="tab-btn" onclick="switchShelfTab('purchased')">
            💰 Lịch sử mua truyện
          </button>
        </div>

        <div id="shelf-favorite" class="shelf-content">
          <div class="story-grid" id="favorite-grid">
            <p class="empty-message">Bạn chưa thích bộ truyện nào.</p>
          </div>
        </div>

        <div id="shelf-following" class="shelf-content active">
          <div class="story-grid" id="following-grid">
            <p class="empty-message">Bạn chưa theo dõi bộ truyện nào.</p>
          </div>
        </div>

        <div id="shelf-purchased" class="shelf-content">
          <div class="update-list" id="purchased-list">
            <p class="empty-message">Bạn chưa mua nội dung trả phí nào.</p>
          </div>
        </div>
      </section>
    </main>

    

    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/data/Fake_DataBase.js"></script>
    
    <script src="../../scripts/auth/Auth.js"></script>
    <script src="../../scripts/shelf/Book_Shelf.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
