<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tủ Sách Của Tôi - Tori Lightnovel</title>
    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/card_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/bookshelf_style.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
  </head>
  <body>
    <header class="header">
      <div class="navigation-bar-top">
        <div class="logo">
          <a href="#" data-route="home"><img data-asset="logo" alt="Logo" /></a>
        </div>
        <ul id="auth-menu">
          <li><a href="#" data-route="login">Đăng nhập</a></li>
          <li>
            <a href="#" data-route="signup" class="button-general">Đăng ký</a>
          </li>
        </ul>
      </div>
      <div class="navigation-bar-bottom">
        <div class="navigation-bar-bottom-left_side">
          <ul>
            <li><a href="#" data-route="home">Trang chủ</a></li>
            <li><a href="#" data-route="storyList">Danh sách truyện</a></li>
            <li>
              <a href="#" data-route="selfWritten">Truyện sáng tác</a>
            </li>
            <li>
              <a href="#" data-route="bookshelf" class="active">Tủ sách</a>
            </li>
            <li>
              <a href="#" data-route="advancedSearch">Tìm kiếm năng cao</a>
            </li>
          </ul>
        </div>
        <div class="navigation-bar-bottom-right_side">
          <div class="search-bar">
            <input type="text" placeholder="Tìm kiếm truyện..." />
            <button type="submit" id="search-button">🔍︎</button>
          </div>

          <a href="#" data-route="cart" class="cart-icon" title="Giỏ hàng">
            🛒 <span id="cart-count">0</span>
          </a>

          <button id="dark-mode-btn" onclick="toggleDarkMode()">
            ⏾ Tắt đèn
          </button>
          <button type="button" id="recharge" data-route-click="recharge">
            Nạp tiền
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="left-section" style="flex: 1">
        <div class="bookshelf-tabs">
          <button class="tab-btn active" onclick="switchShelfTab('following')">
            📖 Truyện theo dõi
          </button>
          <button class="tab-btn" onclick="switchShelfTab('purchased')">
            💰 Lịch sử mua truyện
          </button>
        </div>

        <div id="shelf-following" class="shelf-content active">
          <div class="story-grid" id="following-grid">
            <p class="empty-message">Bạn chưa theo dõi bộ truyện nào.</p>
          </div>
        </div>

        <div id="shelf-purchased" class="shelf-content">
          <div class="update-list" id="purchased-list">
            <p class="empty-message">Bạn chưa mua nội dung trả phí nào.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Tori Lightnovel. Nền tảng đọc truyện trực tuyến.</p>
      <div class="footer-links">
        <a href="">Điều khoản</a>
        <a href="">Bảo mật</a>
        <a href="">Liên hệ</a>
      </div>
    </footer>

    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/data/Fake_DataBase.js"></script>
    <script src="../../scripts/ui/Dark_Mode.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
    <script src="../../scripts/shelf/Book_Shelf.js"></script>
  </body>
</html>
