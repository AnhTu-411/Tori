<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truyện tự sáng tác - Tori Lightnovel</title>
    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/card_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
    <link rel="stylesheet" href="https://unpkg.com/atropos/atropos.css" />
  </head>
  <body>
    
    <main class="main-content">
      <!-- cột trái: danh sách truyện-->
      <section class="left-section">
        <h2 class="section-title">Danh sách truyện sáng tác</h2>
        <div class="sort-container" style="font-weight: bold; color: #000080">
          <label for="sort-select">Sắp xếp: </label>
          <select
            id="sort-select"
            onchange="sortStories(this.value)"
            style="padding: 5px; border-radius: 5px; cursor: pointer"
          >
            <option value="default">Mặc định</option>
            <option value="az">Tên: A - Z</option>
            <option value="za">Tên: Z - A</option>
          </select>
        </div>
        <!-- container dùng để đẩy truyện vào-->
        <div id="story-list-container" class="story-grid"></div>
      </section>
    </main>
    

    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/data/Fake_DataBase.js"></script>
    
    <script src="../../scripts/stories/Sorting.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
    <script src="../../scripts/ui/Navbar.js"></script>
    <script src="https://unpkg.com/atropos/atropos.min.js"></script>
  </body>
</html>
