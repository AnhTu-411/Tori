<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đọc Truyện - Tori Lightnovel</title>
    <link rel="stylesheet" href="../../styles/reading_style.css" />
  </head>
  <body id="reading-body">
    <div class="reading-sidebar">
      <a href="#" class="tool-btn" id="sidebar-prev-btn" title="Chương trước"
        >❮❮</a
      >
      <a
        href="#"
        class="tool-btn"
        id="sidebar-home-btn"
        title="Trang chủ truyện"
        >🏠︎</a
      >

      <button class="tool-btn" id="font-size-btn" title="Tùy chỉnh chữ" onclick="changeFontSize()">A</button>
      <button
        class="tool-btn"
        id="read-theme-btn"
        onclick="toggleReadTheme()"
        title="Đổi màu nền"
      >
        ☀︎
      </button>
      <button class="tool-btn" id="bookmark-btn" title="Đánh dấu">🗒</button>

      <a href="#" class="tool-btn" id="sidebar-next-btn" title="Chương sau"
        >❯❯</a
      >
    </div>

    <main class="reading-container">
      <div class="reading-header">
        <h3 class="vol-title" id="read-vol-title">Đang tải tên tập...</h3>
        <h1 class="chapter-title" id="read-chap-title">
          Đang tải tên chương...
        </h1>
        <p class="chapter-meta" id="read-chap-meta"></p>
        
        <div id="server-switcher" style="text-align: center; margin-top: 20px; display: none;">
           <span style="font-weight: bold; margin-right: 10px;">Đổi Server Ảnh: </span>
           <button onclick="switchImageServer(1)" id="btn-server-1" class="btn-server" style="padding: 5px 15px; margin: 0 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #eee;">Server 1</button>
           <button onclick="switchImageServer(2)" id="btn-server-2" class="btn-server" style="padding: 5px 15px; margin: 0 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #eee;">Server 2 (Dự phòng)</button>
        </div>
      </div>

      <div class="reading-content" id="read-content-box"></div>

      <div class="reading-nav-bottom" id="reading-nav-box"></div>

      <!-- KHU VỰC BÌNH LUẬN CHƯƠNG -->
      <div id="chapter-comments-section" style="margin-top: 40px; padding: 20px; border-top: 2px solid #ccc;">
        <h3 style="margin-bottom: 15px;">Bình luận chương</h3>
        
        <form id="comment-form" style="margin-bottom: 20px;">
          <textarea id="comment-input" rows="3" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; resize: vertical;" placeholder="Viết bình luận của bạn về chương này..."></textarea>
          <button type="submit" style="margin-top: 10px; padding: 8px 16px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">Gửi bình luận</button>
        </form>

        <div id="comments-list" style="display: flex; flex-direction: column; gap: 15px;">
          <p style="text-align: center; color: #888;">Đang tải bình luận...</p>
        </div>
      </div>
    </main>

    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/data/Fake_DataBase.js"></script>
    <script src="../../scripts/reading/Reading.js"></script>
  </body>
</html>
