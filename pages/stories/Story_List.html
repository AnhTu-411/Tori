<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách truyện - Tori Lightnovel</title>
    <link rel="stylesheet" href="../../styles/main_style.css" />
    <link rel="stylesheet" href="../../styles/card_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
    <link rel="stylesheet" href="../../styles/main_header_style.css" />
    <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
    <link rel="stylesheet" href="../../styles/animation_style.css" />
  </head>
  <body>
    <header class="header">
      <div class="navigation-bar-top">
        <div class="logo">
          <a href="#" data-route="home"
            ><img data-asset="logo" alt=""
          /></a>
        </div>
        <ul id="auth-menu">
          <li><a href="#" data-route="login">Đăng nhập</a></li>
          <li>
            <a href="#" data-route="signup" class="button-general">Đăng ký</a>
          </li>
        </ul>
      </div>
      <div class="navigation-bar-bottom">
        <div class="navigation-bar-bottom-left_side">
          <ul>
            <li><a href="#" data-route="home">Trang chủ</a></li>
            <li><a href="#" data-route="storyList">Danh sách truyện</a></li>
            <li><a href="#" data-route="selfWritten">Truyện sáng tác</a></li>
            <li><a href="#" data-route="bookshelf">Tủ sách</a></li>
          </ul>
        </div>
        <div class="navigation-bar-bottom-right_side">
          <div class="search-bar">
            <input type="text" placeholder="Tìm kiếm truyện..." />
            <button type="submit" id="search-button">🔍︎</button>
          </div>
          <a
            href="#"
            data-route="cart"
            class="cart-icon"
            title="Giỏ hàng"
          >
            🛒 <span id="cart-count">0</span>
          </a>
          <button id="dark-mode-btn" onclick="toggleDarkMode()">
            ⏾ Tắt đèn
          </button>
          <button
            type="button"
            id="recharge"
            data-route-click="recharge"
          >
            Nạp tiền
          </button>
        </div>
      </div>
    </header>
    <main class="main-content">
      <!--danh sach truyen-->
      <section class="left-section">
        <h2 class="section-title">Danh sách truyện</h2>
        <div class="sort-container" style="font-weight: bold; color: #000080">
          <label for="sort-select">Sắp xếp: </label>
          <select
            id="sort-select"
            onchange="sortStories(this.value)"
            style="padding: 5px; border-radius: 5px; cursor: pointer"
          >
            <option value="default">Mặc định</option>
            <option value="az">Tên: A - Z</option>
            <option value="za">Tên: Z - A</option>
          </select>
        </div>
        <!--Container chua truyen-->
        <div id="story-list-container" class="story-grid"></div>
      </section>
    </main>
    <div class="footer">
      <p>© 2026 Tori Lightnovel. Nền tảng đọc truyện trực tuyến.</p>
      <div class="footer-links">
        <a href="">Điều khoản</a>
        <a href="">Bảo mật</a>
        <a href="">Liên hệ</a>
      </div>
    </div>
    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/data/Fake_DataBase.js"></script>
    <script src="../../scripts/stories/Sorting.js"></script>
    <script src="../../scripts/ui/Dark_Mode.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
  </body>
</html>
