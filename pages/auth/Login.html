<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng điều khiển</title>
    <link rel="stylesheet" href="../../styles/authentication_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
      <link rel="stylesheet" href="../../styles/main_style.css" />
      <link rel="stylesheet" href="../../styles/main_header_style.css" />
      <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  </head>
  <body>
    
    <main class="authentication-main-content">
      <div class="authentication-main-content-form">
        <form id="myform">
          <div class="authentication-main-content-tittle">
            <h2>Đăng nhập</h2>
          </div>
          <p>Email hoặc tên đăng nhập</p>
          <input
            type="text"
            id="log-username"
            placeholder="Nhập tên đăng nhập"
          />

          <p>Mật khẩu</p>
          <div class="password-wrapper" style="position: relative">
            <input
              type="password"
              id="log-password"
              placeholder="Nhập mật khẩu"
              style="padding-right: 40px"
            />
            <span
              onclick="togglePassword('log-password')"
              style="
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                font-size: 18px;
              "
              >🧐</span
            >
          </div>

          <div class="myform-options">
            <label for="remember"
              ><input type="checkbox" id="remember" />Duy trì đăng nhập</label
            >
            <a href="#" data-route="passwordRecover">Quên mật khẩu?</a>
          </div>

          <button type="button" class="button-general" onclick="handleLogin()">
            Đăng nhập
          </button>
        </form>
      </div>
    </main>
    
    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
