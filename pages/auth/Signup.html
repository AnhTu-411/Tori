<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng điều khiển</title>
    <link rel="stylesheet" href="../../styles/authentication_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
      <link rel="stylesheet" href="../../styles/main_style.css" />
      <link rel="stylesheet" href="../../styles/main_header_style.css" />
      <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  </head>
  <body>
    
    <main class="authentication-main-content">
      <div class="authentication-main-content-form">
        <form id="myform">
          <div class="authentication-main-content-tittle">
            <h2>Đăng ký tài khoản</h2>
            <p>Hoặc <a href="#" data-route="login">đăng nhập nếu đã có tài khoản</a></p>
          </div>
          <p>Tên đăng nhập <span>*</span></p>
          <input type="text" id="reg-username" placeholder="Nhập tên" />

          <p>Địa chỉ email <span>*</span></p>
          <input type="email" id="reg-email" placeholder="Nhập địa chỉ email" />

          <p>Mật khẩu <span>*</span></p>
          <div class="password-wrapper" style="position: relative">
            <input
              type="password"
              id="reg-password"
              placeholder="Nhập mật khẩu"
              style="padding-right: 40px"
            />
            <span
              onclick="togglePassword('reg-password')"
              style="
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                font-size: 18px;
              "
              >🧐</span
            >
          </div>

          <p>Xác nhận mật khẩu <span>*</span></p>
          <div class="password-wrapper" style="position: relative">
            <input
              type="password"
              id="reg-confirm"
              placeholder="Xác nhận mật khẩu"
              style="padding-right: 40px"
            />
            <span
              onclick="togglePassword('reg-confirm')"
              style="
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                font-size: 18px;
              "
              >🧐</span
            >
          </div>
          <br />

          <button type="button" class="button-general" onclick="handleSignup()">
            Đăng ký
          </button>
        </form>
      </div>
    </main>
    
    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
