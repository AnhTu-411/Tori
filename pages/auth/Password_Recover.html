<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng điều khiển</title>
    <link rel="stylesheet" href="../../styles/authentication_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
  </head>
  <body>
    <header class="authentication-header">
      <div class="logo">
        <a href="#" data-route="home"
          ><img data-asset="logo" alt=""
        /></a>
      </div>
      <div class="navigation-bar-top">
        <ul id="auth-menu">
          <li><a href="#" data-route="login">Đăng nhập</a></li>
          <li><a href="#" data-route="signup" class="button-general">Đăng ký</a></li>
        </ul>
      </div>
    </header>
    <main class="authentication-main-content">
      <div class="authentication-main-content-tittle">
        <h2>Đặt lại mật khẩu</h2>
      </div>
      <div class="authentication-main-content-form">
        <form id="myform">
          <p>Địa chỉ email</p>
          <input
            type="email"
            placeholder="Nhập địa chỉ email vào đây để gửi mã"
          />
          <br />
          <a href="" class="button-general">Gửi đường dẫn đặt lại mật khẩu</a>
          <p><a href="#" data-route="login">Quay trở lại đăng nhập</a></p>
        </form>
      </div>
    </main>
    <footer class="footer">
      <p>© 2026 Tori Lightnovel. Nền tảng đọc truyện trực tuyến.</p>
      <div class="footer-links">
        <a href="">Điều khoản</a>
        <a href="">Bảo mật</a>
        <a href="">Liên hệ</a>
      </div>
    </footer>
    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
  </body>
</html>
