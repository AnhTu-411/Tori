<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giám sát Nhật ký - Tori Admin</title>
  <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
  <link rel="stylesheet" href="../../styles/main_style.css" />
  <link rel="stylesheet" href="../../styles/main_header_style.css" />
  <link rel="stylesheet" href="../../styles/footer_style.css" />
  <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  <link rel="stylesheet" href="../../styles/admin_style.css">
</head>
<body>
  
  <main class="main-content" style="min-height: 70vh;">
    <!-- Sidebar Admin -->
    <aside class="admin-sidebar">
      <h2>Tori Admin</h2>
      <nav>
        <ul>
          <li><a href="Admin_Stories.html">Quản lý Truyện</a></li>
          <li id="menu-publisher-requests"><a href="Admin_Publisher_Requests.html">Duyệt NXB</a></li>
          <li id="menu-transactions"><a href="Admin_Transactions.html">Quản lý Đơn Hàng</a></li>
          <li id="menu-users" style="display: none;"><a href="Admin_Users.html">Quản lý Tài Khoản</a></li>
          <li id="menu-admin-logs"><a href="Admin_Logs.html" class="active">Giám sát Nhật ký</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content Admin -->
    <div class="admin-main">
      <div class="admin-header">
        <h1>Giám sát Nhật ký (Admin Logs)</h1>
      </div>

      <div class="admin-filters" style="margin-bottom: 15px; display: flex; gap: 10px;">
        <input type="text" id="search-logs" placeholder="Tìm kiếm tài khoản, hành động..." style="padding: 8px; width: 300px; border: 1px solid #ccc; border-radius: 4px;">
        <button id="btn-search-logs" class="btn btn-info">Tìm kiếm</button>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Quản trị viên</th>
              <th>Loại hành động</th>
              <th>Chi tiết</th>
            </tr>
          </thead>
          <tbody id="logs-table-body">
            <!-- Dữ liệu render bằng JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../../scripts/ui/Routes.js"></script>
  <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/admin/admin_logs.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
