<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Tài Khoản - Tori Owner</title>
  <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
  <link rel="stylesheet" href="../../styles/main_style.css" />
  <link rel="stylesheet" href="../../styles/main_header_style.css" />
  <link rel="stylesheet" href="../../styles/footer_style.css" />
  <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  <link rel="stylesheet" href="../../styles/admin_style.css">
</head>
<body>
  
  <main class="main-content" style="min-height: 70vh;">
    <!-- Sidebar Admin -->
    <aside class="admin-sidebar">
      <h2>Tori Admin</h2>
      <nav>
        <ul>
          <li><a href="Admin_Stories.html">Quản lý Truyện</a></li>
          <li id="menu-publisher-requests"><a href="Admin_Publisher_Requests.html">Duyệt NXB</a></li>
          <li id="menu-transactions"><a href="Admin_Transactions.html">Quản lý Đơn Hàng</a></li>
          <li id="menu-users" style="display: none;"><a href="Admin_Users.html" class="active">Quản lý Tài Khoản</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content Admin -->
    <div class="admin-main">
      <div class="admin-header">
        <h1>Quản lý Tài Khoản (Owner)</h1>
        <button id="add-user-btn" class="button-general">➕ Thêm tài khoản</button>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên đăng nhập</th>
              <th>Email</th>
              <th>Phân quyền (Role)</th>
              <th>Số dư (Coins)</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <!-- Dữ liệu render bằng JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Create User -->
  <div id="create-user-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: var(--bg-color, white); padding: 20px; border-radius: 8px; width: 400px; color: var(--text-color, black);">
      <h2>Tạo Tài Khoản Mới</h2>
      <br>
      <label>Tên đăng nhập:</label>
      <input type="text" id="create-username" class="form-control" style="width: 100%; margin-bottom: 10px;">

      <label>Email:</label>
      <input type="email" id="create-email" class="form-control" style="width: 100%; margin-bottom: 10px;">

      <label>Mật khẩu:</label>
      <input type="password" id="create-password" class="form-control" style="width: 100%; margin-bottom: 10px;">

      <label>Phân quyền (Role):</label>
      <select id="create-role" class="form-control" style="width: 100%; margin-bottom: 10px;">
        <option value="user">Người dùng (user)</option>
        <option value="publisher">Nhà xuất bản (publisher)</option>
        <option value="admin">Quản trị viên (admin)</option>
        <option value="owner">Chủ sở hữu (owner)</option>
      </select>
      
      <label>Số dư (Coins):</label>
      <input type="number" id="create-coins" class="form-control" style="width: 100%; margin-bottom: 20px;" value="0">

      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button id="close-create-modal-btn" class="btn btn-secondary">Hủy</button>
        <button id="submit-create-user-btn" class="btn btn-primary">Tạo mới</button>
      </div>
    </div>
  </div>

  <!-- Modal Edit User -->
  <div id="edit-user-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: var(--bg-color, white); padding: 20px; border-radius: 8px; width: 400px; color: var(--text-color, black);">
      <h2>Cập nhật Tài khoản</h2>
      <br>
      <label>Phân quyền (Role):</label>
      <select id="edit-user-role" class="form-control" style="width: 100%; margin-bottom: 10px;">
        <option value="user">Người dùng (user)</option>
        <option value="publisher">Nhà xuất bản (publisher)</option>
        <option value="admin">Quản trị viên (admin)</option>
        <option value="owner">Chủ sở hữu (owner)</option>
      </select>
      
      <label>Số dư (Coins):</label>
      <input type="number" id="edit-user-coins" class="form-control" style="width: 100%; margin-bottom: 10px;">

      <label>Đổi mật khẩu mới (Bỏ trống nếu không đổi):</label>
      <input type="text" id="edit-user-password" class="form-control" style="width: 100%; margin-bottom: 20px;" placeholder="Mật khẩu mới...">

      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button id="close-modal-btn" class="btn btn-secondary">Hủy</button>
        <button id="save-user-btn" class="btn btn-primary">Lưu thay đổi</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/ui/Routes.js"></script>
  <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/admin/admin_users.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
