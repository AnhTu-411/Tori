<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm/Sửa Truyện - Tori Admin</title>
  <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
  <link rel="stylesheet" href="../../styles/main_style.css" />
  <link rel="stylesheet" href="../../styles/main_header_style.css" />
  <link rel="stylesheet" href="../../styles/footer_style.css" />
  <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  <link rel="stylesheet" href="../../styles/admin_style.css">
</head>
<body>
  

  <main class="main-content" style="min-height: 70vh;">
    <aside class="admin-sidebar">
      <h2>Tori Admin</h2>
      <nav>
        <ul>
          <li><a href="Admin_Stories.html" class="active">Quản lý Truyện</a></li>
          <li id="menu-publisher-requests"><a href="Admin_Publisher_Requests.html">Duyệt NXB</a></li>
          <li id="menu-transactions"><a href="Admin_Transactions.html">Quản lý Đơn Hàng</a></li>
          <li id="menu-users" style="display: none;"><a href="Admin_Users.html">Quản lý Tài Khoản</a></li>
        </ul>
      </nav>
    </aside>

    <div class="admin-main">
      <div class="admin-header">
        <h1 id="form-title">Thêm Truyện Mới</h1>
        <a href="Admin_Stories.html" class="btn" style="background-color: #95a5a6; color: white;">← Quay lại</a>
      </div>

      <div class="admin-form-container">
        <form id="story-form">
          <div class="form-group">
            <label for="title">Tên Truyện</label>
            <input type="text" id="title" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="author">Tác giả</label>
            <input type="text" id="author" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="coverImg">Link Ảnh Bìa</label>
            <input type="url" id="coverImg" class="form-control" placeholder="https://..." required>
            <img id="cover-preview" class="thumbnail-preview" src="" alt="Cover Preview">
          </div>
          <div class="form-group">
            <label for="status">Trạng thái</label>
            <select id="status" class="form-control">
              <option value="Đang tiến hành">Đang tiến hành</option>
              <option value="Hoàn thành">Hoàn thành</option>
              <option value="Tạm ngưng">Tạm ngưng</option>
            </select>
          </div>
          <div class="form-group">
            <label for="genres">Thể loại (ngăn cách bằng dấu phẩy)</label>
            <input type="text" id="genres" class="form-control" placeholder="Hành động, Phiêu lưu, Tình cảm..." required>
          </div>
          <div class="form-group">
            <label for="publishedDate">Ngày xuất bản (Không bắt buộc)</label>
            <input type="date" id="publishedDate" class="form-control">
          </div>
          <div class="form-group" style="display: none;">
            <label>
              <input type="checkbox" id="isPremium"> Là truyện có bản quyền (Thu phí)?
            </label>
          </div>
          <div class="form-group" id="price-group">
            <label for="price">Giá bán toàn bộ truyện (Nhập 0 nếu miễn phí)</label>
            <input type="number" id="price" class="form-control" value="0" min="0">
          </div>
          <div class="form-group">
            <label for="description">Mô tả nội dung</label>
            <textarea id="description" class="form-control" required></textarea>
          </div>
          <button type="submit" class="button-general" style="width: 100%; padding: 12px; font-size: 16px;">Lưu Truyện</button>
        </form>
      </div>
    </div>
  </main>

  

  <script src="../../scripts/ui/Routes.js"></script>
  <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/admin/admin_story_form.js"></script>
  
<script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
