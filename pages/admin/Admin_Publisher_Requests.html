<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duyệt Nhà Xuất Bản - Tori Admin</title>
  <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
  <link rel="stylesheet" href="../../styles/main_style.css" />
  <link rel="stylesheet" href="../../styles/main_header_style.css" />
  <link rel="stylesheet" href="../../styles/footer_style.css" />
  <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  <link rel="stylesheet" href="../../styles/admin_style.css">
</head>
<body>
  

  <main class="main-content" style="min-height: 70vh;">
    <aside class="admin-sidebar">
      <h2>Tori Admin</h2>
      <nav>
        <ul>
          <li><a href="Admin_Stories.html">Quản lý Truyện</a></li>
          <li id="menu-publisher-requests"><a href="Admin_Publisher_Requests.html" class="active">Duyệt NXB</a></li>
        </ul>
      </nav>
    </aside>

    <div class="admin-main">
      <div class="admin-header">
        <h1>Quản lý Nhà Xuất Bản</h1>
      </div>

      <!-- Bảng Đơn xin duyệt -->
      <h2 style="margin-top: 20px; margin-bottom: 15px;">1. Đơn xin làm Nhà Xuất Bản</h2>
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID User</th>
              <th>Tên User</th>
              <th>Lý do / Kinh nghiệm</th>
              <th>Ngày gửi</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="requests-table-body">
            <!-- Dữ liệu sẽ được render bằng JS -->
          </tbody>
        </table>
      </div>

      <!-- Bảng Danh sách hiện tại -->
      <h2 style="margin-top: 40px; margin-bottom: 15px;">2. Danh sách Nhà Xuất Bản hiện tại</h2>
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID User</th>
              <th>Tên User</th>
              <th>Email</th>
              <th>Số dư (Coin)</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="publishers-table-body">
            <!-- Dữ liệu sẽ được render bằng JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  

  <script src="../../scripts/ui/Routes.js"></script>
