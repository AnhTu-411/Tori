<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Truyện - Tori Admin</title>
  <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
  <link rel="stylesheet" href="../../styles/main_style.css" />
  <link rel="stylesheet" href="../../styles/main_header_style.css" />
  <link rel="stylesheet" href="../../styles/footer_style.css" />
  <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  <link rel="stylesheet" href="../../styles/admin_style.css">
</head>
<body>
  <!-- Header gốc từ trang chủ -->
  

  <!-- Layout Main Content chuẩn -->
  <main class="main-content" style="min-height: 70vh;">
    <!-- Sidebar Admin -->
    <aside class="admin-sidebar">
      <h2>Tori Owner</h2>
      <nav>
        <ul>
          <li><a href="Admin_Stories.html" class="active">Quản lý Truyện</a></li>
          <li id="menu-publisher-requests"><a href="Admin_Publisher_Requests.html">Duyệt NXB</a></li>
          <li id="menu-transactions"><a href="Admin_Transactions.html">Quản lý Đơn Hàng</a></li>
          <li id="menu-users" style="display: none;"><a href="Admin_Users.html">Quản lý Tài Khoản</a></li>
          <li id="menu-admin-logs"><a href="Admin_Logs.html">Giám sát Nhật ký</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content Admin -->
    <div class="admin-main">
      <div class="admin-header">
        <h1>Danh sách Truyện</h1>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
          <input type="text" id="search-story-input" class="form-control" style="width: 250px;" placeholder="Tìm tên truyện, tác giả...">
          
          <input type="text" id="search-genre" class="form-control" style="width: 200px;" placeholder="Thể loại (VD: Hành động, Hài hước)">

          <select id="search-status" class="form-control" style="width: 150px;">
            <option value="">Tất cả trạng thái</option>
            <option value="Đang tiến hành">Đang tiến hành</option>
            <option value="Hoàn thành">Hoàn thành</option>
            <option value="Tạm ngưng">Tạm ngưng</option>
          </select>

          <select id="search-approval" class="form-control" style="width: 170px;">
            <option value="">Tất cả kiểm duyệt</option>
            <option value="approved">Đã duyệt (Truyện)</option>
            <option value="unapproved">Chưa duyệt (Truyện)</option>
            <option value="has_unapproved_chapters">Có chương chờ duyệt</option>
            <option value="pending_delete">Yêu cầu xoá (Truyện)</option>
          </select>

          <input type="number" id="search-year" class="form-control" style="width: 120px;" placeholder="Năm (VD: 2024)">
          
          <button id="btn-admin-search" class="btn btn-info" style="margin-right: auto;">Tìm kiếm</button>

          <a href="Admin_Story_Form.html" class="btn btn-primary" style="margin-left: auto;">+ Thêm Truyện Mới</a>
        </div>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên truyện</th>
              <th>Tác giả</th>
              <th>Trạng thái</th>
              <th>Kiểm Duyệt</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="stories-table-body">
            <!-- Dữ liệu sẽ được render bằng JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Footer gốc -->
  

  <script src="../../scripts/ui/Routes.js"></script>
  <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/admin/admin_stories.js"></script>
  
<script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
