<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Chương - Tori Admin</title>
  <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
  <link rel="stylesheet" href="../../styles/main_style.css" />
  <link rel="stylesheet" href="../../styles/main_header_style.css" />
  <link rel="stylesheet" href="../../styles/footer_style.css" />
  <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  <link rel="stylesheet" href="../../styles/admin_style.css">
</head>
<body>
  <!-- Header gốc từ trang chủ -->
  

  <main class="main-content" style="min-height: 70vh;">
    <aside class="admin-sidebar">
      <h2>Tori Admin</h2>
      <nav>
        <ul>
          <li><a href="Admin_Stories.html" class="active">Quản lý Truyện</a></li>
          <li id="menu-publisher-requests"><a href="Admin_Publisher_Requests.html">Duyệt NXB</a></li>
          <li id="menu-transactions"><a href="Admin_Transactions.html">Quản lý Đơn Hàng</a></li>
          <li id="menu-users" style="display: none;"><a href="Admin_Users.html">Quản lý Tài Khoản</a></li>
          <li id="menu-admin-logs"><a href="Admin_Logs.html">Giám sát Nhật ký</a></li>
        </ul>
      </nav>
    </aside>

    <div class="admin-main">
      <div class="admin-header">
        <div>
          <h1>Danh sách Chương</h1>
          <p id="story-title-display" style="color: #7f8c8d; margin-top: 5px;">Đang tải...</p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
          <select id="filter-chapter-approval" class="form-control" style="width: 160px;" onchange="filterChapters()">
            <option value="">Tất cả kiểm duyệt</option>
            <option value="approved">Đã duyệt</option>
            <option value="unapproved">Chưa duyệt</option>
            <option value="pending_delete">Yêu cầu xoá</option>
          </select>
          <button id="btn-approve-all" class="btn" style="background-color: #27ae60; color: white; display: none;" onclick="approveAllChapters()">✓ Duyệt tất cả</button>
          <a href="Admin_Stories.html" class="btn" style="background-color: #95a5a6; color: white;">← Quay Lại</a>
          <a href="#" id="btn-add-chapter" class="btn btn-primary">+ Thêm Chương Mới</a>
        </div>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Chương số</th>
              <th>Tiêu đề</th>
              <th>Giá (Coins)</th>
              <th>Ngày tạo</th>
              <th>Kiểm Duyệt</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="chapters-table-body">
            <!-- Dữ liệu sẽ được render bằng JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  

  <script src="../../scripts/ui/Routes.js"></script>
  <script src="../../scripts/auth/Auth.js"></script>
  <script src="../../scripts/admin/admin_chapters.js"></script>
  
<script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
