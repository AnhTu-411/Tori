<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký Nhà Xuất Bản - Tori Lightnovel</title>
    <link rel="icon" sizes="16x16" href="../../assets/images/Falvicon.ico" />
    <link rel="stylesheet" href="../../styles/authentication_style.css" />
    <link rel="stylesheet" href="../../styles/footer_style.css" />
      <link rel="stylesheet" href="../../styles/main_style.css" />
      <link rel="stylesheet" href="../../styles/main_header_style.css" />
      <link rel="stylesheet" href="../../styles/dark_mode_style.css" />
  </head>
  <body>
    
    <main class="authentication-main-content" style="min-height: 60vh;">
      <div class="authentication-main-content-tittle">
        <h2>Đăng Ký Trở Thành Nhà Xuất Bản</h2>
        <p>Trở thành NXB để tự do đăng tải truyện của riêng bạn, cài đặt giá bán và nhận doanh thu trực tiếp từ người đọc!</p>
      </div>
      <div class="authentication-main-content-form">
        <form id="publisher-register-form">
          <p>Lý do muốn làm NXB / Kinh nghiệm của bạn <span>*</span></p>
          <textarea id="reason" rows="6" placeholder="Ví dụ: Mình là tác giả tự do có 2 năm kinh nghiệm viết tiểu thuyết trên các nền tảng mạng..." style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 20px; font-family: inherit; resize: vertical;" required></textarea>
          
          <br />
          <button type="submit" class="button-general" style="width: 100%; padding: 12px; font-size: 16px;">
            Gửi Đơn Đăng Ký
          </button>
        </form>
      </div>
    </main>
    
    <script src="../../scripts/ui/Routes.js"></script>
    <script src="../../scripts/auth/Auth.js"></script>
    <script src="../../scripts/account/Publisher_Register.js"></script>
  <script src="../../scripts/ui/Navbar.js"></script>
</body>
</html>
