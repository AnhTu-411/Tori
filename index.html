<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ - Tori Lightnovel</title>
    <link rel="stylesheet" href="./styles/main_style.css" />
    <link rel="stylesheet" href="./styles/main_header_style.css" />
    <link rel="stylesheet" href="./styles/card_style.css" />
    <link rel="stylesheet" href="./styles/main_comment_box_style.css" />
    <link rel="stylesheet" href="./styles/footer_style.css" />
    <link rel="stylesheet" href="./styles/dark_mode_style.css" />
    <link rel="stylesheet" href="./styles/animation_style.css" />
  </head>
  <body>
    <header class="header">
      <div class="navigation-bar-top">
        <div class="logo">
          <a href="#" data-route="home"
            ><img data-asset="logo" alt=""
          /></a>
        </div>
        <ul id="auth-menu">
          <li><a href="#" data-route="login">Đăng nhập</a></li>
          <li>
            <a href="#" data-route="signup" class="button-general">Đăng ký</a>
          </li>
        </ul>
      </div>
      <div class="navigation-bar-bottom">
        <div class="navigation-bar-bottom-left_side">
          <ul>
            <li><a href="#" data-route="home">Trang chủ</a></li>
            <li>
              <a href="#" data-route="storyList">Danh sách truyện</a>
            </li>
            <li>
              <a href="#" data-route="selfWritten"
                >Truyện sáng tác</a
              >
            </li>
            <li><a href="#" data-route="bookshelf">Tủ sách</a></li>
          </ul>
        </div>
        <div class="navigation-bar-bottom-right_side">
          <div class="search-bar">
            <input type="text" placeholder="Tìm kiếm truyện..." />
            <button type="submit" id="search-button">🔍︎</button>
          </div>
          <a
            href="#"
            data-route="cart"
            class="cart-icon"
            title="Giỏ hàng"
          >
            🛒 <span id="cart-count">0</span>
          </a>
          <button id="dark-mode-btn" onclick="toggleDarkMode()">
            ⏾ Tắt đèn
          </button>
          <button
            type="button"
            id="recharge"
            data-route-click="recharge"
          >
            Nạp tiền
          </button>
        </div>
      </div>
    </header>
    <main class="main-content">
      <!--danh sách truyện-->
      <section class="left-section">
        <div class="section-header">
          <h2 class="section-title">Truyện Nổi Bật</h2>

          <div class="carousel-arrows">
            <button onclick="slideCarousel(-1)">&#10094;</button>
            <button onclick="slideCarousel(1)">&#10095;</button>
          </div>
        </div>

        <div class="carousel-viewport">
          <div id="story-list-container" class="story-grid-carousel"></div>
        </div>
        <div class="New-update">
          <div class="section-header">
            <h2 class="section-title">Mới cập nhật ⛛</h2>
          </div>

          <div id="new-updates-container" class="update-list"></div>

          <div id="pagination-container" class="pagination"></div>
        </div>
      </section>

      <!--cột comment-->
      <aside class="right-section">
        <div class="comment-box">
          <h2
            class="section-title"
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 15px;
            "
          >
            <span>Có thể bạn sẽ thích</span>
            <button
              onclick="loadRandomStory()"
              style="
                background: none;
                border: none;
                cursor: pointer;
                font-size: 22px;
                color: inherit;
                transition: transform 0.4s ease;
                padding: 0;
              "
              title="Đổi truyện khác"
              onmouseover="this.style.transform = 'rotate(180deg)'"
              onmouseout="this.style.transform = 'rotate(0deg)'"
            >
              ↻
            </button>
          </h2>

          <div
            id="random-story-container"
            style="display: flex; justify-content: center"
          ></div>
        </div>
      </aside>
    </main>
    <footer class="footer">
      <p>© 2026 Tori Lightnovel. Nền tảng đọc truyện trực tuyến.</p>
      <div class="footer-links">
        <a href="">Điều khoản</a>
        <a href="">Bảo mật</a>
        <a href="">Liên hệ</a>
      </div>
    </footer>
    <script src="./scripts/ui/Routes.js"></script>
    <script src="./scripts/data/Fake_DataBase.js"></script>
    <script src="./scripts/ui/Navigation_Animation.js"></script>
    <script src="./scripts/stories/Fake_List.js"></script>
    <script src="./scripts/ui/Dark_Mode.js"></script>
    <script src="./scripts/auth/Auth.js"></script>
    <script src="./scripts/stories/Random_Story.js"></script>
  </body>
</html>
